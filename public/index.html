<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICK QUIZ - 토스 인앱 서비스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/gh/okone7/font/nanumsquare.css');
        body { font-family: 'NanumSquare', sans-serif; background-color: #f2f4f6; -webkit-tap-highlight-color: transparent; }
        .toss-blue { color: #3182f6; }
        .toss-bg-blue { background-color: #3182f6; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #3182f6; color: white; border-radius: 16px; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: #1b64da; }
        .hidden { display: none; }
        .modal-bg { background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-800">

    <nav class="flex items-center justify-between px-6 py-4 bg-white sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 toss-bg-blue rounded-full flex items-center justify-center text-white">
                <i class="fas fa-question text-sm"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">KICK QUIZ</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right">
                <p class="text-xs text-gray-400">내 포인트</p>
                <p class="font-bold toss-blue" id="user-points">0 P</p>
            </div>
            <div class="text-right border-l pl-4">
                <p class="text-xs text-gray-400">VAR권</p>
                <p class="font-bold text-red-500" id="user-var">0개</p>
            </div>
        </div>
    </nav>

    <main class="flex-grow p-5 space-y-6 overflow-y-auto">
        
        <section id="view-home" class="space-y-4">
            <div class="card p-6 flex flex-col items-center text-center">
                <h2 class="text-2xl font-extrabold mb-2">⚽ 오늘의 퀴즈</h2>
                <p class="text-gray-500 text-sm mb-6">4문제를 모두 맞히고 치킨 박스에 도전하세요!</p>
                <button onclick="startQuiz()" class="btn-primary w-full py-4 text-lg font-bold">퀴즈 시작하기</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="card p-5 flex flex-col items-center cursor-pointer" onclick="showPK()">
                    <i class="fas fa-futbol text-2xl mb-2 toss-blue"></i>
                    <span class="font-bold">승부차기</span>
                    <span class="text-xs text-gray-400">매일 1회 운 테스트</span>
                </div>
                <div class="card p-5 flex flex-col items-center cursor-pointer" onclick="showShop()">
                    <i class="fas fa-store text-2xl mb-2 text-orange-400"></i>
                    <span class="font-bold">상점</span>
                    <span class="text-xs text-gray-400">포인트로 박스 구매</span>
                </div>
            </div>
        </section>

        <section id="view-quiz" class="hidden space-y-4">
            <div class="flex justify-between items-center mb-2 px-2">
                <span class="text-sm font-bold toss-blue" id="quiz-level-text">LEVEL: EASY</span>
                <span class="text-sm text-gray-400" id="quiz-progress">1 / 4</span>
            </div>
            <div class="card p-8 min-h-[300px] flex flex-col justify-center text-center">
                <h3 id="quiz-question" class="text-xl font-bold leading-relaxed mb-8">문제를 불러오고 있습니다...</h3>
                <div id="quiz-options" class="space-y-3">
                    </div>
            </div>
        </section>

        <section id="view-pk" class="hidden card p-8 text-center space-y-6">
            <h2 class="text-2xl font-bold">🥅 일일 승부차기</h2>
            <p class="text-gray-500">방향을 선택해 슛을 날리세요! (성공 시 50P)</p>
            <div class="flex justify-around py-10">
                <button onclick="playPK(0)" class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fas fa-arrow-left"></i></button>
                <button onclick="playPK(1)" class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fas fa-arrow-up"></i></button>
                <button onclick="playPK(2)" class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fas fa-arrow-right"></i></button>
            </div>
            <button onclick="showHome()" class="text-gray-400 text-sm">돌아가기</button>
        </section>

        <section id="view-shop" class="hidden space-y-4">
            <h2 class="text-xl font-bold px-2">🎁 포인트 상점</h2>
            <div class="card p-5 flex justify-between items-center">
                <div>
                    <p class="font-bold">📦 야식 박스</p>
                    <p class="text-xs text-gray-400">육개장, 박카스, VAR권 등</p>
                </div>
                <button onclick="buyBox('basic')" class="toss-bg-blue text-white px-4 py-2 rounded-xl font-bold">500 P</button>
            </div>
            <div class="card p-5 flex justify-between items-center opacity-75">
                <div>
                    <p class="font-bold">👑 황금 치킨 박스</p>
                    <p class="text-xs text-gray-400">주말 한정 활성화</p>
                </div>
                <button class="bg-gray-300 text-white px-4 py-2 rounded-xl font-bold cursor-not-allowed">1,500 P</button>
            </div>
            <button onclick="showHome()" class="w-full text-center text-gray-400 text-sm py-4">돌아가기</button>
        </section>

    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 modal-bg">
        <div class="card w-full p-8 text-center space-y-4 max-w-sm">
            <h3 id="modal-title" class="text-2xl font-bold">결과</h3>
            <p id="modal-body" class="text-gray-500 leading-relaxed"></p>
            <button id="modal-btn" class="btn-primary w-full py-4 font-bold text-lg">확인</button>
            <button id="modal-cancel" onclick="closeModal()" class="text-gray-400 text-sm block w-full">닫기</button>
        </div>
    </div>

    <script>
        // --- 상태 관리 ---
        let state = {
            points: 0,
            varCards: 0,
            questions: { easy: [], hard: [] },
            currentStep: 0, // 0, 1 (EASY) | 2, 3 (HARD)
            currentQuestion: null,
            isQuizActive: false
        };

        // --- 초기화 및 로드 ---
        window.onload = async () => {
            await loadData();
            updateUI();
        };

        async function loadData() {
            try {
                // ./questions.json 으로 현재 폴더의 파일을 찾음
                const response = await fetch('./questions.json');
                if (!response.ok) throw new Error(`HTTP 에러! 상태: ${response.status}`);
                
                const data = await response.json();
                state.questions = data;
                console.log("데이터 로드 성공:", data);
            } catch (error) {
                console.error("데이터 로드 실패:", error);
                alert("퀴즈 데이터를 가져오지 못했습니다. 파일 위치를 확인해주세요.\n(public 폴더 안에 있어야 합니다)");
                document.getElementById('quiz-question').innerText = "로드 실패: " + error.message;
            }
        }

        function updateUI() {
            document.getElementById('user-points').innerText = `${state.points} P`;
            document.getElementById('user-var').innerText = `${state.varCards}개`;
        }

        // --- 네비게이션 ---
        function showView(viewId) {
            ['view-home', 'view-quiz', 'view-pk', 'view-shop'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(viewId).classList.remove('hidden');
        }

        function showHome() { showView('view-home'); }
        function showShop() { showView('view-shop'); }
        function showPK() { showView('view-pk'); }

        // --- 퀴즈 로직 ---
        function startQuiz() {
            if (!state.questions.easy.length) return alert("데이터가 아직 로드되지 않았습니다.");
            state.currentStep = 0;
            state.isQuizActive = true;
            showView('view-quiz');
            nextQuestion();
        }

        function nextQuestion() {
            let qPool = state.currentStep < 2 ? state.questions.easy : state.questions.hard;
            // 랜덤으로 문제 하나 뽑기
            state.currentQuestion = qPool[Math.floor(Math.random() * qPool.length)];
            
            document.getElementById('quiz-level-text').innerText = state.currentStep < 2 ? "LEVEL: EASY" : "LEVEL: HARD 🔥";
            document.getElementById('quiz-progress').innerText = `${state.currentStep + 1} / 4`;
            document.getElementById('quiz-question').innerText = state.currentQuestion.q;
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            state.currentQuestion.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 border-2 border-gray-100 rounded-2xl font-bold hover:border-blue-400 transition text-lg bg-white";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            if (idx === state.currentQuestion.c) {
                // 정답
                let reward = state.currentStep < 2 ? 20 : 50;
                state.points += reward;
                updateUI();
                
                if (state.currentStep === 1) {
                    showAdHurdle();
                } else if (state.currentStep === 3) {
                    showResult("🎉 전원 정답!", "오늘의 퀴즈를 모두 맞히셨습니다!\n보너스 포인트가 적립되었습니다.");
                    showHome();
                } else {
                    state.currentStep++;
                    nextQuestion();
                }
            } else {
                // 오답
                if (state.varCards > 0) {
                    showVarModal();
                } else {
                    showResult("🚨 오답!", "아쉽게도 탈락하셨습니다.\n내일 다시 도전하거나 상점에서 VAR권을 구하세요!");
                    showHome();
                }
            }
        }

        // --- 기획서 2.1 광고 허들 ---
        function showAdHurdle() {
            showModal(
                "축하합니다!",
                "EASY 단계를 통과하셨습니다.\n광고를 시청하고 더 큰 보상(HARD)에 도전하시겠습니까?",
                "광고 보고 도전하기",
                () => {
                    closeModal();
                    // 광고 시청 완료 가정
                    state.currentStep++;
                    nextQuestion();
                }
            );
        }

        // --- 승부차기 로직 ---
        function playPK(dir) {
            const win = Math.random() < 0.5;
            if (win) {
                state.points += 50;
                showResult("⚽ GOAL!!!", "완벽한 슛입니다! 50P를 획득했습니다.");
            } else {
                showResult("🧤 막혔습니다!", "골키퍼의 선방에 막혔네요. 내일 다시 도전하세요!");
            }
            updateUI();
            showHome();
        }

        // --- 상점 로직 ---
        function buyBox(type) {
            if (state.points < 500) return alert("포인트가 부족합니다!");
            state.points -= 500;
            
            const rand = Math.random() * 100;
            let item = "";
            
            if (rand < 5) item = "🍜 육개장 사발면";
            else if (rand < 10) item = "💊 박카스 F";
            else if (rand < 50) {
                item = "🎟️ VAR 프리패스권";
                state.varCards++;
            } else {
                item = "꽝 (위로금 100P)";
                state.points += 100;
            }
            
            updateUI();
            
            if (item.includes("기프티콘")) {
                showModal("🎊 당첨!", `${item}에 당첨되셨습니다!\n오픈카톡으로 인증하고 바코드를 받으세요.`, "오픈카톡 인증", () => {
                    window.location.href = "https://open.kakao.com/o/sn6xyrbi";
                });
            } else {
                showResult("박스 결과", `결과: ${item}`);
            }
        }

        // --- 모달 시스템 ---
        function showModal(title, body, btnText, btnAction) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            const btn = document.getElementById('modal-btn');
            btn.innerText = btnText;
            btn.onclick = btnAction;
            document.getElementById('modal').classList.remove('hidden');
        }

        function showResult(title, body) {
            showModal(title, body, "확인", closeModal);
            document.getElementById('modal-cancel').classList.add('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal-cancel').classList.remove('hidden');
        }

        function showVarModal() {
            showModal(
                "VAR 판독",
                "오답입니다! VAR 프리패스권을 사용하여\n정답 처리하고 계속 진행하시겠습니까?",
                "사용하기 (잔여: " + state.varCards + "개)",
                () => {
                    state.varCards--;
                    updateUI();
                    closeModal();
                    if (state.currentStep === 1) showAdHurdle();
                    else { state.currentStep++; nextQuestion(); }
                }
            );
        }
    </script>
</body>
</html>
