<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICK QUIZ - 토스 스타일</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/gh/okone7/font/nanumsquare.css');
        body { font-family: 'NanumSquare', sans-serif; background-color: #f2f4f6; -webkit-tap-highlight-color: transparent; }
        .toss-blue { color: #3182f6; }
        .toss-bg-blue { background-color: #3182f6; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #3182f6; color: white; border-radius: 16px; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: #1b64da; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-800">

    <nav class="flex items-center justify-between px-6 py-4 bg-white sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 toss-bg-blue rounded-full flex items-center justify-center text-white font-bold">Q</div>
            <span class="font-bold text-xl tracking-tight">KICK QUIZ</span>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">내 포인트</p>
            <p class="font-bold toss-blue" id="user-points">0 P</p>
        </div>
    </nav>

    <main class="flex-grow p-5 space-y-6">
        <section id="view-home" class="space-y-4">
            <div class="card p-8 text-center">
                <h2 class="text-2xl font-extrabold mb-2">⚽ 오늘의 퀴즈</h2>
                <p id="status-msg" class="text-gray-500 text-sm mb-6">데이터를 확인하는 중...</p>
                <button id="start-btn" onclick="startQuiz()" disabled class="bg-gray-300 text-white w-full py-4 text-lg font-bold rounded-2xl cursor-not-allowed">잠시만 기다려주세요</button>
            </div>
        </section>

        <section id="view-quiz" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <span class="text-sm font-bold toss-blue" id="quiz-level-text">LEVEL: EASY</span>
                <span class="text-sm text-gray-400" id="quiz-progress">1 / 4</span>
            </div>
            <div class="card p-8 min-h-[300px] flex flex-col justify-center text-center">
                <h3 id="quiz-question" class="text-xl font-bold leading-relaxed mb-8">문제를 불러오는 중...</h3>
                <div id="quiz-options" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <script>
        let state = {
            points: 0,
            questions: null,
            currentStep: 0,
            currentQuestion: null
        };

        // --- 지능형 데이터 로더 ---
        async function loadData() {
            const statusMsg = document.getElementById('status-msg');
            const startBtn = document.getElementById('start-btn');
            
            // 시도할 경로 리스트 (Vercel의 다양한 환경 대응)
            const paths = ['./questions.json', '/questions.json', 'questions.json'];
            
            for (let path of paths) {
                try {
                    console.log(`경로 시도 중: ${path}`);
                    const response = await fetch(path);
                    if (response.ok) {
                        state.questions = await response.json();
                        console.log(`성공 경로: ${path}`);
                        statusMsg.innerText = "준비 완료! 400문제가 기다리고 있어요.";
                        statusMsg.classList.remove('text-gray-500');
                        statusMsg.classList.add('text-blue-500');
                        startBtn.disabled = false;
                        startBtn.innerText = "퀴즈 시작하기";
                        startBtn.className = "btn-primary w-full py-4 text-lg font-bold";
                        return; // 로드 성공 시 함수 종료
                    }
                } catch (e) {
                    console.error(`${path} 로드 실패:`, e);
                }
            }

            // 모든 경로 실패 시
            statusMsg.innerText = "데이터 로드 실패 (404). 파일 위치를 확인해주세요.";
            statusMsg.classList.add('text-red-500');
        }

        function startQuiz() {
            if (!state.questions) return;
            state.currentStep = 0;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            nextQuestion();
        }

        function nextQuestion() {
            const pool = state.currentStep < 2 ? state.questions.easy : state.questions.hard;
            state.currentQuestion = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('quiz-progress').innerText = `${state.currentStep + 1} / 4`;
            document.getElementById('quiz-question').innerText = state.currentQuestion.q;
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            state.currentQuestion.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 border-2 border-gray-100 rounded-2xl font-bold bg-white";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (idx === state.currentQuestion.c) {
                        state.points += (state.currentStep < 2 ? 20 : 50);
                        document.getElementById('user-points').innerText = `${state.points} P`;
                        if (state.currentStep === 3) {
                            alert("완주 성공!");
                            location.reload();
                        } else {
                            state.currentStep++;
                            nextQuestion();
                        }
                    } else {
                        alert("탈락! 내일 다시 도전하세요.");
                        location.reload();
                    }
                };
                optionsDiv.appendChild(btn);
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
