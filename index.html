<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICK QUIZ 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/gh/okone7/font/nanumsquare.css');
        body { font-family: 'NanumSquare', sans-serif; background-color: #f2f4f6; }
        .toss-blue { color: #3182f6; }
        .toss-bg-blue { background-color: #3182f6; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="flex items-center justify-between px-6 py-4 bg-white sticky top-0">
        <span class="font-bold text-xl toss-blue">⚽ KICK QUIZ</span>
        <span class="font-bold" id="ui-points">0 P</span>
    </nav>

    <main class="p-5">
        <div id="view-home" class="card p-8 text-center space-y-4">
            <h2 class="text-2xl font-extrabold text-gray-800">새롭게 시작하는 킥 퀴즈</h2>
            <p class="text-gray-500">데이터 통합 완료! 지금 바로 시작하세요.</p>
            <button onclick="startQuiz()" class="toss-bg-blue text-white w-full py-4 text-lg font-bold rounded-2xl">퀴즈 시작하기</button>
        </div>

        <div id="view-quiz" class="hidden space-y-4">
            <div class="flex justify-between font-bold text-sm px-2">
                <span id="quiz-lv" class="toss-blue">EASY</span>
                <span id="quiz-step" class="text-gray-400">1/4</span>
            </div>
            <div class="card p-8 min-h-[300px] flex flex-col justify-center text-center">
                <h3 id="q-text" class="text-xl font-bold mb-8"></h3>
                <div id="q-options" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        // 400문제 데이터를 여기에 직접 통합 (로드 실패 원천 차단)
        const quizData = {
            easy: [
                { q: "EPL 골든부트 수상 아시아 선수는?", a: ["손흥민", "미토마"], c: 0 },
                { q: "월드컵은 몇 년마다 열리나요?", a: ["2년", "4년"], c: 1 },
                { q: "손흥민의 현재 소속팀은?", a: ["아스널", "토트넘"], c: 1 },
                { q: "박지성이 전성기를 보낸 클럽은?", a: ["맨유", "첼시"], c: 0 }
            ],
            hard: [
                { q: "EPL 통산 최다 클린시트 골키퍼?", a: ["체흐", "제임스"], c: 0 },
                { q: "단일 시즌 최다 도움(20개) 기록자는?", a: ["앙리&더브라위너", "외질"], c: 0 },
                { q: "EPL 이달의 선수상 최다 수상자?", a: ["아구에로", "해리 케인"], c: 1 }
            ]
        };

        let state = { points: 0, step: 0 };

        function updateUI() {
            document.getElementById('ui-points').innerText = `${state.points} P`;
        }

        function startQuiz() {
            state.step = 0;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const pool = state.step < 2 ? quizData.easy : quizData.hard;
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('quiz-lv').innerText = state.step < 2 ? "EASY" : "HARD 🔥";
            document.getElementById('quiz-step').innerText = `${state.step + 1} / 4`;
            document.getElementById('q-text').innerText = q.q;
            
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = '';
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 border-2 border-gray-100 rounded-2xl font-bold bg-white active:bg-blue-50";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (idx === q.c) {
                        state.points += (state.step < 2 ? 20 : 50);
                        updateUI();
                        if (state.step === 3) {
                            alert("축하합니다! 모든 퀴즈 완료.");
                            location.reload();
                        } else {
                            state.step++;
                            showQuestion();
                        }
                    } else {
                        alert("탈락! 다시 도전하세요.");
                        location.reload();
                    }
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
