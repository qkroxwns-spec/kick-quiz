<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚽ KICK QUIZ 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/gh/okone7/font/nanumsquare.css');
        body { font-family: 'NanumSquare', sans-serif; background-color: #f2f4f6; -webkit-tap-highlight-color: transparent; }
        .toss-blue { color: #3182f6; }
        .toss-bg-blue { background-color: #3182f6; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #3182f6; color: white; border-radius: 18px; transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: #1b64da; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="flex items-center justify-between px-6 py-4 bg-white sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 toss-bg-blue rounded-full flex items-center justify-center text-white font-bold text-xs">Q</div>
            <span class="font-bold text-xl tracking-tight toss-blue">KICK QUIZ</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-400">내 포인트</p>
            <p class="font-extrabold toss-blue" id="ui-points">0 P</p>
        </div>
    </nav>

    <main class="flex-grow p-5 flex flex-col justify-center">
        <div id="view-home" class="card p-10 text-center space-y-6">
            <div class="space-y-2">
                <h2 class="text-2xl font-black text-gray-800">드디어 정상 가동!</h2>
                <p class="text-gray-500 text-sm">기존 에러를 모두 잡은 2.0 버전입니다.</p>
            </div>
            <div class="bg-blue-50 p-4 rounded-2xl">
                <p class="text-blue-600 text-xs font-bold">🔥 매일 4문제 완료 시 보너스 100P</p>
            </div>
            <button onclick="startQuiz()" class="btn-primary w-full py-5 text-lg font-black shadow-lg shadow-blue-200">퀴즈 시작하기</button>
        </div>

        <div id="view-quiz" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <span id="quiz-lv" class="text-xs font-black px-3 py-1 bg-blue-100 toss-blue rounded-full">EASY</span>
                <span id="quiz-step" class="text-sm font-bold text-gray-400 tracking-widest">1 / 4</span>
            </div>
            <div class="card p-8 min-h-[350px] flex flex-col justify-center text-center">
                <h3 id="q-text" class="text-xl font-bold leading-snug mb-10 text-gray-800"></h3>
                <div id="q-options" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        // 대표님이 주신 소중한 데이터를 코드에 직접 박았습니다. (외부 로드 실패 원천 차단)
        const db = {
            easy: [
                {q: "EPL 골든부트 수상 아시아 선수는?", a: ["손흥민", "미토마"], c: 0},
                {q: "월드컵은 몇 년마다 열리나요?", a: ["2년", "4년"], c: 1},
                {q: "손흥민의 현재 소속팀은?", a: ["아스널", "토트넘"], c: 1},
                {q: "박지성이 전성기를 보낸 클럽은?", a: ["맨유", "첼시"], c: 0},
                {q: "EPL 한 시즌 총 팀 수는?", a: ["18팀", "20팀"], c: 1},
                {q: "맨유 역사상 가장 위대한 감독은?", a: ["퍼거슨", "무리뉴"], c: 0},
                {q: "리버풀 홈구장의 이름은?", a: ["안필드", "올드 트래포드"], c: 0}
            ],
            hard: [
                {q: "EPL 통산 최다 클린시트 골키퍼?", a: ["체흐", "제임스"], c: 0},
                {q: "단일 시즌 최다 도움(20개) 기록자는?", a: ["앙리&더브라위너", "외질"], c: 0},
                {q: "EPL 이달의 선수상 최다 수상자?", a: ["아구에로", "해리 케인"], c: 1},
                {q: "무실점 우승(04-05) 당시 첼시의 실점은?", a: ["15실점", "18실점"], c: 0},
                {q: "EPL 역사상 가장 빠른 퇴장 기록은?", a: ["제라드", "도일"], c: 0}
            ]
        };

        let state = { points: 0, step: 0 };

        function startQuiz() {
            state.step = 0;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const pool = state.step < 2 ? db.easy : db.hard;
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('quiz-lv').innerText = state.step < 2 ? "LEVEL: EASY" : "LEVEL: HARD 🔥";
            document.getElementById('quiz-step').innerText = `${state.step + 1} / 4`;
            document.getElementById('q-text').innerText = q.q;
            
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 border-2 border-gray-100 rounded-2xl font-bold bg-white active:bg-blue-50 text-gray-700 transition-all";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (idx === q.c) {
                        state.points += (state.step < 2 ? 20 : 50);
                        document.getElementById('ui-points').innerText = `${state.points} P`;
                        if (state.step === 3) {
                            alert("🎊 올킬! 퀴즈 마스터 등극!");
                            location.reload();
                        } else {
                            state.step++;
                            showQuestion();
                        }
                    } else {
                        alert("🚨 오답입니다! 내일 다시 도전하세요.");
                        location.reload();
                    }
                };
                optDiv.appendChild(btn);
            });
        }
    </script>
</body>
</html>
