<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICK QUIZ v1.0 - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/gh/okone7/font/nanumsquare.css');
        body { font-family: 'NanumSquare', sans-serif; background-color: #f2f4f6; }
        .toss-blue { color: #3182f6; }
        .toss-bg-blue { background-color: #3182f6; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="flex items-center justify-between px-6 py-4 bg-white sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 toss-bg-blue rounded-full flex items-center justify-center text-white font-bold text-xs">K</div>
            <span class="font-bold text-xl toss-blue">KICK QUIZ</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-400">보유 포인트</p>
            <p class="font-extrabold toss-blue" id="ui-points">0 P</p>
        </div>
    </nav>

    <main class="flex-grow p-5 space-y-4">
        <div id="view-home" class="space-y-4">
            <div class="card p-8 text-center space-y-6">
                <h2 class="text-2xl font-black">⚽ 오늘의 챌린지</h2>
                <div id="loading-status" class="text-sm text-gray-400">데이터 로드 중...</div>
                <button id="start-btn" onclick="startQuiz()" disabled class="bg-gray-300 text-white w-full py-5 text-lg font-black rounded-2xl cursor-not-allowed">데이터 불러오는 중</button>
            </div>
            
            <div class="card p-6 space-y-4">
                <h3 class="font-bold text-gray-800">아이템 상점</h3>
                <div class="flex gap-3 overflow-x-auto pb-2">
                    <button onclick="buyItem('VAR', 100)" class="flex-shrink-0 bg-blue-50 p-4 rounded-2xl text-center border border-blue-100">
                        <p class="text-xs text-blue-600 font-bold">VAR 사용권</p>
                        <p class="text-sm font-black">100 P</p>
                    </button>
                    <button onclick="buyItem('AD', 0)" class="flex-shrink-0 bg-gray-50 p-4 rounded-2xl text-center border border-gray-100">
                        <p class="text-xs text-gray-600 font-bold">광고보고 포인트</p>
                        <p class="text-sm font-black">무료</p>
                    </button>
                </div>
            </div>
        </div>

        <div id="view-quiz" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <span id="quiz-lv" class="text-xs font-black px-3 py-1 bg-blue-100 toss-blue rounded-full">LEVEL</span>
                <span id="quiz-step" class="text-sm font-bold text-gray-400 tracking-widest">1 / 4</span>
            </div>
            <div class="card p-8 min-h-[350px] flex flex-col justify-center text-center">
                <h3 id="q-text" class="text-xl font-bold leading-snug mb-10"></h3>
                <div id="q-options" class="space-y-3"></div>
            </div>
            <button id="var-btn" class="hidden w-full py-3 bg-yellow-400 text-white font-bold rounded-xl shadow-md">📺 VAR 사용하기 (잔여: <span id="var-count">0</span>)</button>
        </div>
    </main>

    <script>
        let state = {
            points: 0,
            step: 0,
            questions: null,
            items: { var: 0 }
        };

        // 1. 데이터 로드 (JSON 파일 불러오기)
        async function init() {
            try {
                const res = await fetch('./questions.json');
                if (!res.ok) throw new Error();
                state.questions = await res.json();
                
                const btn = document.getElementById('start-btn');
                btn.disabled = false;
                btn.innerText = "오늘의 퀴즈 시작";
                btn.className = "toss-bg-blue text-white w-full py-5 text-lg font-black rounded-2xl shadow-lg";
                document.getElementById('loading-status').innerText = "총 400문제가 준비되었습니다.";
            } catch (e) {
                document.getElementById('loading-status').innerText = "데이터 로드 실패. (questions.json 확인)";
            }
        }

        function startQuiz() {
            state.step = 0;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const pool = state.step < 2 ? state.questions.easy : state.questions.hard;
            const q = pool[Math.floor(Math.random() * pool.length)];
            
            document.getElementById('quiz-lv').innerText = state.step < 2 ? "EASY" : "HARD 🔥";
            document.getElementById('quiz-step').innerText = `${state.step + 1} / 4`;
            document.getElementById('q-text').innerText = q.q;
            
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = '';
            
            q.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full py-4 border-2 border-gray-100 rounded-2xl font-bold bg-white active:bg-blue-50";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (idx === q.c) {
                        state.points += (state.step < 2 ? 20 : 50);
                        document.getElementById('ui-points').innerText = `${state.points} P`;
                        if (state.step === 3) {
                            alert("🎊 올킬 성공! 보너스 100P 지급!");
                            state.points += 100;
                            location.reload();
                        } else {
                            state.step++;
                            showQuestion();
                        }
                    } else {
                        handleWrongAnswer();
                    }
                };
                optDiv.appendChild(btn);
            });
        }

        function handleWrongAnswer() {
            if (state.items.var > 0) {
                if (confirm("🚨 오답! VAR을 사용하여 부활하시겠습니까?")) {
                    state.items.var--;
                    updateUI();
                    return; // 부활 (현재 문제 유지)
                }
            }
            alert("탈락했습니다. 내일 다시 도전하세요!");
            location.reload();
        }

        function buyItem(name, price) {
            if (state.points < price) return alert("포인트가 부족합니다.");
            state.points -= price;
            if (name === 'VAR') state.items.var++;
            alert(`${name} 구매 완료!`);
            updateUI();
        }

        function updateUI() {
            document.getElementById('ui-points').innerText = `${state.points} P`;
            document.getElementById('var-count').innerText = state.items.var;
        }

        window.onload = init;
    </script>
</body>
</html>
